<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --tg-blue: #2481cc;
            --bg-gray: #f0f2f5;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Roboto', sans-serif;
            background-color: #000; /* Background gelap di belakang pop-up */
        }

        /* Overlay transparan agar fokus ke kotak putih */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal {
            background: white;
            width: 100%;
            max-width: 380px;
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 2px solid #eee;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #222;
            margin: 0 0 5px 0;
        }

        .subscribers {
            color: #8a8a8a;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .btn-message {
            display: block;
            background-color: var(--tg-blue);
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: 25px;
            font-weight: 500;
            font-size: 16px;
            margin: 0 auto 30px;
            width: 80%;
            text-transform: uppercase;
            transition: background 0.3s;
        }

        .btn-message:hover {
            background-color: #1c66a3;
        }

        .description {
            color: #666;
            font-size: 13px;
            line-height: 1.5;
            padding: 0 10px;
        }

        .description b {
            color: #444;
        }
    </style>
</head>
<body>

<div class="overlay">
    <div class="modal">
        <img src="Screenshot 2026-02-01 191431.png" alt="Profile" class="profile-img">
        
        <h1>Private Girls 18++</h1>
        <div class="subscribers">14980 Subscribe</div>

        <a href="https://57.bestincomeaffiliate.com/" class="btn-message">MESSAGE NOW</a>

        <p class="description">
            You are invited to the group <b>You may choose women and personal chat.</b> Click above to join.
        </p>
    </div>
</div>

</body>

</html>
